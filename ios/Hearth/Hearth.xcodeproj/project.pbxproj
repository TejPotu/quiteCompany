			shellPath = /bin/sh;
			shellScript = "# CLiteRTLM.framework ships nested dylibs (e.g. libGemmaModelConstraintProvider.dylib)\n# that Xcode's automatic embed-and-sign does not re-sign with the app's identity.\n# Without this, dyld rejects the dylib at launch (\"code signature invalid\").\nset -e\nFRAMEWORKS_DIR=\"$CODESIGNING_FOLDER_PATH/Frameworks\"\n[ -d \"$FRAMEWORKS_DIR\" ] || exit 0\nfind \"$FRAMEWORKS_DIR\" -type f \\( -name '*.dylib' -o -name '*.framework' \\) -print0 | while IFS= read -r -d '' item; do\n    /usr/bin/codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" --timestamp=none \"$item\"\ndone\n";
		};
